version: '3.8'

services:
  gateway-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gateway-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - gateway_net
    expose:
      - "3000"

  redis:
    image: redis:7-alpine
    container_name: gateway-redis
    restart: unless-stopped
    # Use password for redis if needed, but since it's on an internal network it's protected
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - gateway_net
    expose:
      - "6379"

  nginx:
    image: nginx:alpine
    container_name: gateway-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway-app
    networks:
      - gateway_net

networks:
  gateway_net:
    driver: bridge
