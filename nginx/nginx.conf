user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Security: Hide Nginx version
    server_tokens off;

    # Basic Rate Limiting at Nginx Level
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Limit payload size to prevent Buffer Overflow / DoS
    client_max_body_size 1M;
    client_body_buffer_size 128k;

    # Block common malicious User-Agents
    map $http_user_agent $bad_client {
        default 0;
        ~*(nmap|nikto|sqlmap|curl|wget|python) 1;
    }

    upstream node_app {
        server gateway-app:3000;
    }

    server {
        listen       80;
        server_name  localhost;

        # Add global security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        if ($bad_client) {
            return 403;
        }

        location / {
            limit_req zone=mylimit burst=20 nodelay;
            
            proxy_pass http://node_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeout settings to mitigate slowloris attacks
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
